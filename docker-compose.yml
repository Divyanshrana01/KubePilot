services:

  # ──────────────────────────────────────────────────────────────
  #  PostgreSQL
  # ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: adv_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adv_rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────────────────────
  #  Qdrant (vector store)
  # ──────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.17.0
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────────────────────
  #  DB seed  (run once: docker compose run --rm db-seed)
  # ──────────────────────────────────────────────────────────────
  db-seed:
    image: enterprise_rag-app
    command: ["python", "scripts/seed_db.py"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/adv_rag
      PYTHONPATH: /app
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./seed:/app/seed
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - seed

  # ──────────────────────────────────────────────────────────────
  #  Application
  # ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Service-internal URLs — override the localhost values in .env
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/adv_rag
      QDRANT_URL: http://qdrant:6333
      # Secrets that must be present (no default fallback)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      UPSTASH_REDIS_URL: ${UPSTASH_REDIS_URL}
      UPSTASH_REDIS_TOKEN: ${UPSTASH_REDIS_TOKEN}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./seed:/app/seed
    command: ["python", "scripts/serve.py"]
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy


volumes:
  postgres_data:
  qdrant_data:
